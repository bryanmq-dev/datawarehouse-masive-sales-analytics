version: '3.8'

services:
  origen_postgres:
    image: postgres:15
    container_name: src_postgres
    environment:
      POSTGRES_USER: brayan_admin
      POSTGRES_PASSWORD: super_password_123
      POSTGRES_DB: e_commerce_br
    ports:
      - "5433:5432"
    volumes:
      - src_postgres_data:/var/lib/postgresql/data

  origen_sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: src_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dwh_Brayan_2026_Enterprise*"
    ports:
      - "1434:1433"
    volumes:
      - src_sqlserver_data:/var/opt/mssql

  origen_mongodb:
    image: mongo:latest
    container_name: src_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: brayan_admin
      MONGO_INITDB_ROOT_PASSWORD: super_password_123
    ports:
      - "27018:27017"
    volumes:
      - src_mongodb_data:/data/db

  data_warehouse:
    build: .
    container_name: dwh_postgres
    environment:
      POSTGRES_USER: brayan_admin
      POSTGRES_PASSWORD: super_password_123
      POSTGRES_DB: dwh_ventas_global
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./DataGripProject:/mnt/sqlite_data
      - ./mongo_exports:/mnt/mongo_exports
      - ./data/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brayan_admin -d dwh_ventas_global"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backup automático del DWH — corre cada 24h, retiene 7 días
  dwh_backup:
    image: postgres:15
    container_name: dwh_backup
    depends_on:
      data_warehouse:
        condition: service_healthy
    environment:
      PGPASSWORD: super_password_123
    volumes:
      - ./data/backups:/backups
    entrypoint: >
      /bin/sh -c "
        echo 'Backup service listo. Primer backup en 60s...' &&
        sleep 60 &&
        while true; do
          FILENAME=\"/backups/dwh_$$(date +%Y%m%d_%H%M%S).sql\" &&
          pg_dump -h data_warehouse -U brayan_admin dwh_ventas_global > \"$$FILENAME\" &&
          echo \"Backup guardado: $$FILENAME\" &&
          find /backups -name '*.sql' -mtime +7 -delete &&
          echo 'Backups de más de 7 días eliminados.' &&
          sleep 86400
        done
      "
    restart: unless-stopped

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset_bi
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "llave_secreta_super_pro"
    depends_on:
      data_warehouse:
        condition: service_healthy
    volumes:
      - ./superset/home:/app/superset_home
    restart: unless-stopped

volumes:
  src_postgres_data:
  src_sqlserver_data:
  src_mongodb_data:
